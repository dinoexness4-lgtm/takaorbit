const _cache = {};

/* Load ALL keys from Supabase into cache on boot */
async function initDB() {
  if (!supa) { console.warn("Supabase not initialized, using localStorage fallback"); return; }
  try {
    const { data, error } = await supa.from("site_data").select("key,value");
    if (error) throw error;
    data.forEach(row => { if (row.value !== null) _cache[row.key] = row.value; });
    _dbReady = true;
  } catch(e) {
    console.warn("Supabase init failed, using localStorage fallback", e);
    _dbReady = false;
  }
}

/* Map toc_* keys to DB keys */
const KEY_MAP = {
  toc_settings:"settings", toc_posts:"posts", toc_gallery:"gallery",
  toc_programs:"programs", toc_features:"features", toc_steps:"steps",
  toc_testimonials:"testimonials", toc_partners:"partners",
  toc_events:"events", toc_skk:"skk"
};

const store = {
  _mem: {},
  get(k, def) {
    const dbKey = KEY_MAP[k];
    if (dbKey && _dbReady) {
      return (dbKey in _cache) ? _cache[dbKey] : def;
    }
    try { const v = localStorage.getItem(k); return v === null ? def : JSON.parse(v); }
    catch (e) { return (k in this._mem) ? this._mem[k] : def; }
  },
  set(k, v) {
    const dbKey = KEY_MAP[k];
    if (dbKey && _dbReady) {
      _cache[dbKey] = v;
      /* fire-and-forget upsert */
      supa.from("site_data").upsert({ key: dbKey, value: v, updated_at: new Date().toISOString() })
        .then(({error}) => { if (error) console.error("Supabase save error [" + dbKey + "]:", error); });
      return true;
    }
    if (dbKey && !_dbReady) {
      console.warn("store.set: Supabase not ready, falling back to localStorage for key:", k);
    }
    try { localStorage.setItem(k, JSON.stringify(v)); return true; }
    catch (e) { this._mem[k] = v; return false; }
  },
};

/* Get current session on boot — also registers auth state listener */
async function initAuth() {
  if (!supa) return;
  try {
    const { data } = await supa.auth.getSession();
    _authUser = data.session ? data.session.user : null;
    /* Listen to auth state changes */
    supa.auth.onAuthStateChange((event, session) => {
      _authUser = session ? session.user : null;
      const path = parseHash ? parseHash() : "";
      if (path.startsWith("/admin") || path === "/login") render();
    });
  } catch(e) { console.warn("initAuth failed:", e); }
}

/* Parse query string from the hash (e.g. #/admin/posting?edit=3) */
function getQuery() {
  const h = location.hash.replace(/^#/,"");
  const qi = h.indexOf("?");
  if (qi < 0) return {};
  return Object.fromEntries(new URLSearchParams(h.slice(qi+1)));
}

/* Resize + compress an uploaded image to a data URL (keeps localStorage small) */
function fileToData(file, maxDim=1280, quality=0.72, type="image/jpeg") {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const r = Math.min(maxDim/width, maxDim/height);
          width = Math.round(width*r); height = Math.round(height*r);
        }
        const c = document.createElement("canvas");
        c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL(type, quality));
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function postCard(p) {

  return `
  <div class="relative">
    ${edit}
    <a href="#/posting/${p.id}" class="group bg-white rounded-lg border border-outline-variant overflow-hidden hover:shadow-card transition block">
    ${imgBlock(p.image, "h-40", "flex items-end p-3")}

function galleryCard(g) {
  const badge = g.type === "Flyer" ? "bg-secondary text-navy" : "bg-primary text-white";
  const ic = g.type === "Flyer" ? "campaign" : "photo_camera";
  const s = getSettings();
  const waHref = `https://wa.me/${waLink(s.waNumber)}?text=${encodeURIComponent("Halo Taka Orbit, saya tertarik dengan informasi di galeri: " + g.caption)}`;
  return `
  <div class="group relative rounded-lg overflow-hidden border border-outline-variant bg-white flex flex-col">
    ${isAuthed()?`<button data-gedit="${g.id}" title="Kelola galeri" class="absolute top-2 right-2 z-20 inline-flex items-center justify-center w-9 h-9 rounded-full bg-navy-deep/90 text-white hover:bg-primary transition">${icon('edit','text-[18px]')}</button>`:''}
    <div class="relative overflow-hidden ${g.image?'cursor-pointer':('ph-img aspect-[4/3]')}" ${g.image?`data-lb="${g.image}" data-cap="${esc(g.caption)}"`:''}>
      ${g.image
        ? `<img src="${g.image}" loading="lazy" alt="${esc(g.caption)}" class="w-full h-auto block"/>
           <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition flex items-center justify-center pointer-events-none">
             <span class="opacity-0 group-hover:opacity-100 transition bg-white/90 rounded-full p-2">${icon('zoom_in','text-[22px] text-navy')}</span>
           </div>`
        : `<div class="absolute inset-0 flex items-center justify-center text-white/50">${icon(ic,'text-[40px]')}</div>`}
      <span class="absolute top-2 left-2 z-10 ${badge} text-[10px] font-bold label-up px-2 py-1 rounded">${esc(g.type)}</span>
    </div>

      <p class="text-sm font-semibold text-navy leading-snug flex-1">${esc(g.caption)}</p>

  </div>`;
}

function getSkk() { return store.get("toc_skk", DEFAULT_SKK); }
function saveSkk(d) { return store.set("toc_skk", d); }
const SKK_KLAS = ["Semua","Arsitektur","Sipil","Mekanikal","Tata Lingkungan","Manajemen Pelaksanaan"];
const SKK_KLAS_DOT = { "Arsitektur":"#7C5CBF","Sipil":"#006b3f","Mekanikal":"#1a3a5c","Tata Lingkungan":"#5C7A1A","Manajemen Pelaksanaan":"#8B3A1A" };
const SKK_KUAL = ["Semua","Ahli","Teknisi/Analis","Operator"];
let jbKlas="Semua", jbKual="Semua", jbSearch="", jbSort="klas", jbDir=1;

function skkFiltered() {
  let d = getSkk();
  if (jbKlas !== "Semua") d = d.filter(r=>r.klas===jbKlas);
  if (jbKual !== "Semua") d = d.filter(r=>r.kual===jbKual);
  if (jbSearch) { const q = jbSearch.toLowerCase(); d = d.filter(r=>(r.jabker+r.jenjang+r.sub+r.klas).toLowerCase().includes(q)); }
  return [...d].sort((a,b)=>{ const av=jbSort==="kkni"?a[jbSort]:String(a[jbSort]).toLowerCase(); const bv=jbSort==="kkni"?b[jbSort]:String(b[jbSort]).toLowerCase(); return av<bv?-jbDir:av>bv?jbDir:0; });
}
function skkBadge(k) {
  const m = { "Ahli":"background:#e6edf5;color:#1a3a5c", "Teknisi/Analis":"background:#e8f0ea;color:#006b3f", "Operator":"background:#fdf3e0;color:#7a4f00" };
  return `<span class="text-[10.5px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap" style="${m[k]||''}">${esc(k)}</span>`;
}

function renderJabatanStats() {
  const el = $("#jb-stats"); if (!el) return;
  const D = getSkk();
  const ahli = D.filter(d=>d.kual==="Ahli").length;
  const tek = D.filter(d=>d.kual==="Teknisi/Analis").length;
  const op = D.filter(d=>d.kual==="Operator").length;
  const jk = new Set(D.map(d=>d.jabker)).size;
  const card = (n,l,clr) => `<div class="bg-white border border-outline-variant rounded-lg px-4 py-3"><div class="font-display font-extrabold text-2xl" style="color:${clr||'#1a2b3c'}">${n}</div><div class="text-[11px] text-on-surface-variant">${l}</div></div>`;
  el.innerHTML = card(D.length,"Total Jenjang") + card(jk,"Jabatan Kerja") + card(ahli,"Kual. Ahli","#1a3a5c") + card(tek,"Teknisi/Analis","#006b3f") + card(op,"Operator","#7a4f00");
}
function renderSkkFilters() {
  const kl = $("#jb-klas"); const ku = $("#jb-kual"); if (!kl||!ku) return;
  kl.innerHTML = SKK_KLAS.map(k=>{
    const dot = k!=="Semua"?`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${SKK_KLAS_DOT[k]};margin-right:5px;vertical-align:middle"></span>`:"";
    const on = k===jbKlas;
    return `<button data-klas="${k}" class="text-xs font-medium px-3 py-1.5 rounded-full border ${on?'bg-primary text-white border-primary':'bg-white text-on-surface-variant border-outline-variant hover:bg-surface-low'}">${dot}${k}</button>`;
  }).join("");
  ku.innerHTML = SKK_KUAL.map(k=>{
    const on = k===jbKual;
    return `<button data-kual="${k}" class="text-xs font-medium px-3 py-1.5 rounded-full border ${on?'bg-navy text-white border-navy':'bg-white text-on-surface-variant border-outline-variant hover:bg-surface-low'}">${k}</button>`;
  }).join("");
}
function renderJabatanTable() {
  const tb = $("#jb-tbody"); if (!tb) return;
  const rows = skkFiltered();
  $("#jb-info").textContent = `Menampilkan ${rows.length} dari ${getSkk().length} jenjang jabatan kerja`;
  let html = "", lastGroup = null;
  rows.forEach(r=>{
    const grp = r.klas+"||"+r.sub;
    if (grp!==lastGroup) {
      html += `<tr class="bg-surface-low"><td colspan="5" class="label-up text-[11px] text-on-surface-variant px-3.5 py-2"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${SKK_KLAS_DOT[r.klas]||'#888'};margin-right:8px;vertical-align:middle"></span>${esc(r.klas)} — ${esc(r.sub)}</td></tr>`;
      lastGroup = grp;
    }
    html += `<tr class="border-t border-outline-variant hover:bg-[#f7fbf8]">
      <td class="px-3.5 py-2 font-medium text-navy">${esc(r.jabker)}</td>
      <td class="px-3.5 py-2 text-on-surface-variant">${esc(r.jenjang)}</td>
      <td class="px-3.5 py-2 text-on-surface-variant text-[11.5px]">${esc(r.sub)}</td>
      <td class="px-3.5 py-2">${skkBadge(r.kual)}</td>
      <td class="px-3.5 py-2"><span class="font-mono text-[11px] bg-surface-container border border-outline-variant rounded px-2 py-0.5 text-on-surface-variant">${r.kkni}</span></td>
    </tr>`;
  });
  tb.innerHTML = html || `<tr><td colspan="5" class="text-center text-on-surface-variant py-12">Tidak ada hasil yang sesuai.</td></tr>`;
  $$("#jb-thead [data-ic]").forEach(s=>{ s.textContent = "↕"; s.classList.add("opacity-40"); });
  const ic = $(`#jb-thead [data-ic="${jbSort}"]`); if (ic) { ic.textContent = jbDir===1?"↑":"↓"; ic.classList.remove("opacity-40"); }
}
function bindJabatan() {
  renderJabatanStats(); renderSkkFilters(); renderJabatanTable();
  const search = $("#jb-search"); if (search) search.oninput = () => { jbSearch = search.value; renderJabatanTable(); };
  const kl = $("#jb-klas"); if (kl) kl.onclick = (e)=>{ const b=e.target.closest("[data-klas]"); if(!b)return; jbKlas=b.getAttribute("data-klas"); renderSkkFilters(); renderJabatanTable(); };
  const ku = $("#jb-kual"); if (ku) ku.onclick = (e)=>{ const b=e.target.closest("[data-kual]"); if(!b)return; jbKual=b.getAttribute("data-kual"); renderSkkFilters(); renderJabatanTable(); };
  const th = $("#jb-thead"); if (th) th.onclick = (e)=>{ const c=e.target.closest("[data-sort]"); if(!c)return; const col=c.getAttribute("data-sort"); if(jbSort===col) jbDir*=-1; else { jbSort=col; jbDir=1; } renderJabatanTable(); };
}

/* ===========================================================
   GENERIC CRUD ENGINE (Program, Keunggulan, Alur, Testimoni)
   =========================================================== */
function crudTable(ck) {
  const coll = COLLECTIONS[ck];
  const items = coll.get();
  const rows = items.map((it,i) => `
    <tr class="border-b border-outline-variant last:border-0 hover:bg-surface-low">
      <td class="px-4 py-3 text-on-surface-variant w-10">${i+1}</td>
      <td class="px-4 py-3"><div class="font-semibold text-navy">${esc(it[coll.main]||"(tanpa judul)")}</div>${coll.fields.find(f=>f.type==='textarea')?`<div class="text-xs text-on-surface-variant line-clamp-3 mt-0.5">${esc(it[coll.fields.find(f=>f.type==='textarea').id]||"")}</div>`:''}</td>
      <td class="px-4 py-3 text-right whitespace-nowrap">
        <button data-${ck}-up="${it.id}" class="text-on-surface-variant hover:text-navy p-1" title="Naik">${icon('arrow_upward','text-[18px]')}</button>
        <button data-${ck}-down="${it.id}" class="text-on-surface-variant hover:text-navy p-1" title="Turun">${icon('arrow_downward','text-[18px]')}</button>
        <button data-${ck}-edit="${it.id}" class="text-on-surface-variant hover:text-primary p-1" title="Edit">${icon('edit','text-[20px]')}</button>
        <button data-${ck}-del="${it.id}" class="text-on-surface-variant hover:text-error p-1" title="Hapus">${icon('delete','text-[20px]')}</button>
      </td>
    </tr>`).join("");
  const fieldHtml = coll.fields.map(f => {
    if (f.type === "textarea") return `<div><label class="label-up text-xs text-on-surface-variant block mb-1">${f.label}</label><textarea id="${ck}-f-${f.id}" rows="3" class="w-full border border-outline rounded px-3 py-2.5"></textarea></div>`;
    if (f.type === "select") return `<div><label class="label-up text-xs text-on-surface-variant block mb-1">${f.label}</label><select id="${ck}-f-${f.id}" class="w-full border border-outline rounded px-3 py-2.5">${f.options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select></div>`;
    if (f.type === "date") return `<div><label class="label-up text-xs text-on-surface-variant block mb-1">${f.label}</label><input type="date" id="${ck}-f-${f.id}" class="w-full border border-outline rounded px-3 py-2.5"></div>`;
    if (f.type === "image") return `<div><label class="label-up text-xs text-on-surface-variant block mb-1">${f.label}</label>
      <div class="flex items-center gap-3"><div id="${ck}-imgprev-${f.id}" class="w-24 h-16 rounded ph-img overflow-hidden flex-shrink-0"></div>
      <div class="flex-1"><input id="${ck}-imgfile-${f.id}" type="file" accept="image/*" class="block w-full text-sm text-on-surface-variant file:mr-3 file:py-2 file:px-3 file:rounded file:border-0 file:bg-primary file:text-white file:font-semibold">

function bindCrud(ck, deepLink) {
  const coll = COLLECTIONS[ck];
  const modal = $(`#${ck}-modal`);
  const setImgPrev = (fid, src) => { const pv = $(`#${ck}-imgprev-${fid}`); if (!pv) return; pv.innerHTML = src?`<img src="${src}" class="w-full h-full object-cover" alt="">`:""; pv.className = "w-24 h-16 rounded overflow-hidden flex-shrink-0 " + (src?"":"ph-img"); };
  const open = (item) => {
    $(`#${ck}-modal-title`).textContent = item ? ("Edit " + coll.label) : ("Tambah " + coll.label);
    $(`#${ck}-f-id`).value = item ? item.id : "";
    coll.fields.forEach(f => { const el = $(`#${ck}-f-${f.id}`); if (el) el.value = item ? (item[f.id] || "") : (f.type==="select" ? f.options[0] : ""); });
    coll.fields.filter(f=>f.type==="image").forEach(f => { setImgPrev(f.id, item?(item[f.id]||""):""); const file=$(`#${ck}-imgfile-${f.id}`); if(file) file.value=""; });
    modal.classList.remove("hidden"); window.scrollTo(0,0);
  };
  const close = () => modal.classList.add("hidden");
  coll.fields.filter(f=>f.type==="image").forEach(f => {
    const file = $(`#${ck}-imgfile-${f.id}`);
    if (file) file.onchange = async (e) => { const ff = e.target.files[0]; if (!ff) return; try { const d = await fileToData(ff,1280,0.72); $(`#${ck}-f-${f.id}`).value = d; setImgPrev(f.id, d); } catch { alert("Gagal memproses gambar."); } };
    const clr = $(`#${ck}-imgclear-${f.id}`); if (clr) clr.onclick = () => { $(`#${ck}-f-${f.id}`).value=""; setImgPrev(f.id,""); if(file) file.value=""; };
  });
  $(`#${ck}-new`).onclick = () => open(null);
  $(`#${ck}-modal-close`).onclick = close; $(`#${ck}-modal-cancel`).onclick = close;
  $$(`[data-${ck}-edit]`).forEach(b => b.onclick = () => open(coll.get().find(x=>String(x.id)===b.getAttribute(`data-${ck}-edit`))));
  $$(`[data-${ck}-del]`).forEach(b => b.onclick = () => { if (!confirm("Hapus item ini?")) return; coll.save(coll.get().filter(x=>String(x.id)!==b.getAttribute(`data-${ck}-del`))); render(); });
  const move = (id, dir) => {
    const arr = coll.get(); const i = arr.findIndex(x=>String(x.id)===String(id)); const j = i+dir;
    if (i<0 || j<0 || j>=arr.length) return;
    [arr[i],arr[j]] = [arr[j],arr[i]]; coll.save(arr); render();
  };
  $$(`[data-${ck}-up]`).forEach(b => b.onclick = () => move(b.getAttribute(`data-${ck}-up`), -1));
  $$(`[data-${ck}-down]`).forEach(b => b.onclick = () => move(b.getAttribute(`data-${ck}-down`), 1));
  $(`#${ck}-modal-save`).onclick = () => {
    const arr = coll.get(); const id = $(`#${ck}-f-id`).value;
    const data = {}; coll.fields.forEach(f => { const el = $(`#${ck}-f-${f.id}`); data[f.id] = el ? el.value.trim() : ""; });
    if (!data[coll.main]) { alert(coll.fields.find(f=>f.id===coll.main).label + " wajib diisi."); return; }
    if (id) { const idx = arr.findIndex(x=>String(x.id)===String(id)); arr[idx] = Object.assign(arr[idx], data); }
    else { data.id = Date.now(); arr.push(data); }
    coll.save(arr); close(); render();
  };
  if (deepLink) {
    const q = getQuery();
    if (q.edit) { const it = coll.get().find(x=>String(x.id)===String(q.edit)); if (it) open(it); history.replaceState(null,"","#"+parseHash()); }
    else if (q.new) { open(null); history.replaceState(null,"","#"+parseHash()); }
  }
}

            <label class="label-up text-xs text-on-surface-variant block mb-1.5">URL Video (YouTube / Vimeo / MP4)</label>

            <div id="hero-img-prev" class="rounded-lg overflow-hidden bg-white border border-outline-variant flex-shrink-0 w-40">${s.heroMediaType==='image'&&s.heroMediaUrl?`<img src="${esc(s.heroMediaUrl)}" class="w-full h-auto block" alt="">`:''}</div>
            <div class="flex-1 space-y-2">
              <input id="hero-img-file" type="file" accept="image/*" class="block w-full text-sm text-on-surface-variant file:mr-3 file:py-2 file:px-3 file:rounded file:border-0 file:bg-primary file:text-white file:font-semibold">
              <button type="button" id="hero-img-clear" class="text-xs text-error hover:underline">Hapus foto hero</button>

        </div>
      </div>
      <div class="mt-4"><label class="label-up text-xs text-on-surface-variant block mb-1">Teks Ajakan (CTA)</label><textarea id="s-ctaText" rows="2" class="w-full border border-outline rounded px-3 py-2.5">${esc(s.ctaText)}</textarea></div>
      <div class="mt-4"><label class="label-up text-xs text-on-surface-variant block mb-1">Teks Footer</label><textarea id="s-footerText" rows="2" class="w-full border border-outline rounded px-3 py-2.5">${esc(s.footerText)}</textarea></div>
    </div>

    <div class="bg-white rounded-lg border border-outline-variant p-6">
      <h2 class="font-display font-bold text-navy text-lg mb-4 flex items-center gap-2">${icon('contact_phone','text-primary')} Kontak</h2>
      <div class="grid md:grid-cols-2 gap-4">${field('s-waNumber','Nomor WhatsApp (cth 0812... / 62812...)',s.waNumber)}${field('s-phone','Telepon / Hotline',s.phone)}${field('s-email','Email',s.email)}${field('s-address','Alamat',s.address)}</div>
      <p class="text-xs text-on-surface-variant mt-3">${icon('info','text-[16px]')} Nomor WhatsApp harus nomor seluler aktif. Nomor bebas pulsa (0800) tidak bisa menerima WhatsApp — gunakan untuk Telepon/Hotline saja.</p>
    </div>

    <div class="bg-white rounded-lg border border-outline-variant p-6">
      <h2 class="font-display font-bold text-navy text-lg mb-4 flex items-center gap-2">${icon('insights','text-primary')} Statistik (Beranda)</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${field('s-statAlumni','Alumni',s.statAlumni)}${field('s-statBatch','Batch',s.statBatch)}${field('s-statLulus','Kelulusan',s.statLulus)}${field('s-statResmi','Sertifikat Resmi',s.statResmi)}</div>
    </div>

    <div class="bg-white rounded-lg border border-outline-variant p-6">
      <h2 class="font-display font-bold text-navy text-lg mb-4 flex items-center gap-2">${icon('admin_panel_settings','text-primary')} Akun Admin</h2>
      <div class="flex items-start gap-3 bg-surface-low rounded-lg p-4">
        <span class="material-symbols-outlined text-primary mt-0.5">verified_user</span>
        <div class="text-sm text-on-surface-variant">
          <p class="font-semibold text-navy mb-1">Login dikelola oleh Supabase Auth</p>
          <p>Untuk mengubah email atau password admin, buka <a href="https://supabase.com/dashboard/project/xhuyjcwpgboqjvvktwbe/auth/users" target="_blank" class="text-primary font-semibold underline">Supabase Dashboard → Authentication → Users</a>.</p>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-between sticky bottom-0 bg-surface py-3">
      <button id="reset-data" class="text-sm font-semibold text-error hover:underline">Reset ke data awal</button>
      <button id="save-settings" class="inline-flex items-center gap-2 bg-primary text-white font-bold px-6 py-3 rounded hover:bg-primary-container transition">${icon('save')} Simpan Pengaturan</button>
    </div>
    <p id="settings-msg" class="hidden text-sm text-primary font-semibold">${icon('check_circle','text-[18px]')} Pengaturan tersimpan.</p>
  </div>`;
  return adminShell("settings", inner);
}

/* ===========================================================
   ROUTER
   =========================================================== */
function parseHash() { return (location.hash.replace(/^#/,"")||"/").split("?")[0]; }

function render() {
  const path = parseHash();
  const app = $("#app");
  const adminGuard = (fn) => isAuthed() ? fn() : (location.hash="#/login", viewLogin());
  let html;
  if (path==="/"||path==="") html = viewHome();
  else if (path==="/program") html = viewProgram();
  else if (path==="/jabatan") html = viewJabatan();
  else if (path==="/tentang") html = viewAbout();
  else if (path==="/mitra") html = viewPartners();
  else if (path==="/jadwal") html = viewEvents();
  else if (path==="/galeri") html = viewGallery();
  else if (path==="/posting") html = viewPosting();
  else if (path.startsWith("/posting/")) html = viewPostDetail(path.split("/")[2]);
  else if (path==="/login") html = isAuthed()?(location.hash="#/admin",viewAdminDash()):viewLogin();
  else if (path==="/admin") html = adminGuard(viewAdminDash);
  else if (path==="/admin/konten") html = adminGuard(viewAdminContent);
  else if (path==="/admin/program") html = adminGuard(viewAdminProgram);
  else if (path==="/admin/jabatan-skk") html = adminGuard(viewAdminSkk);
  else if (path==="/admin/jadwal") html = adminGuard(viewAdminEvents);
  else if (path==="/admin/posting") html = adminGuard(viewAdminPosts);
  else if (path==="/admin/galeri") html = adminGuard(viewAdminGallery);
  else if (path==="/admin/mitra") html = adminGuard(viewAdminPartners);
  else if (path==="/admin/pengaturan") html = adminGuard(viewAdminSettings);
  else html = viewHome();
  app.innerHTML = html;
  window.scrollTo(0,0);
  bindEvents(path);
}

/* ===========================================================
   EVENTS
   =========================================================== */
function bindEvents(path) {
  const mnav = $("#mnav"); if (mnav) mnav.onclick = () => $("#mmenu").classList.toggle("hidden");

  const fSubmit = $("#f-submit");
  if (fSubmit) fSubmit.onclick = () => {
    const nama = $("#f-nama").value.trim(), hp = $("#f-hp").value.trim(), prog = $("#f-prog").value;
    if (!nama || !hp) { alert("Mohon isi nama dan nomor WhatsApp."); return; }
    $("#f-msg").classList.remove("hidden");
    const s = getSettings();
    const text = encodeURIComponent(`Halo Taka Orbit, saya ${nama} (${hp}) ingin mendaftar program: ${prog}.`);
    setTimeout(()=>window.open(`https://wa.me/${waLink(s.waNumber)}?text=${text}`,"_blank"),700);
  };

  const search = $("#post-search");
  if (search) search.oninput = () => {
    const q = search.value.toLowerCase();
    const grid = $("#post-grid");
    const filtered = getPosts().filter(p=>(p.title+p.excerpt+p.category).toLowerCase().includes(q));
    grid.innerHTML = filtered.length ? filtered.map(p=>postCard(p)).join("") : `<p class="text-on-surface-variant col-span-3">Tidak ada hasil untuk "${esc(q)}".</p>`;
  };

  const lgSubmit = $("#lg-submit");
  if (lgSubmit) {
    const doLogin = async () => {
      const email = $("#lg-email").value.trim();
      const pass = $("#lg-pass").value.trim();
      if (!email || !pass) { $("#lg-err").classList.remove("hidden"); return; }
      lgSubmit.disabled = true;
      lgSubmit.innerHTML = "<span class='material-symbols-outlined animate-spin'>progress_activity</span> Memproses...";
      const { error } = await supa.auth.signInWithPassword({ email, password: pass });
      lgSubmit.disabled = false;
      lgSubmit.innerHTML = "<span class='material-symbols-outlined'>shield</span> Login Admin";
      if (error) {
        $("#lg-err").classList.remove("hidden");
        $("#lg-err").innerHTML = "<span class='material-symbols-outlined text-[18px]'>error</span> Email atau password salah.";
      } else {
        location.hash = "#/admin";
      }
    };
    lgSubmit.onclick = doLogin;
    $("#lg-pass").onkeydown = e => { if (e.key==="Enter") doLogin(); };
    $("#lg-toggle").onclick = () => { const i=$("#lg-pass"); i.type = i.type==="password"?"text":"password"; };
  }

  const logout = $("#logout"); if (logout) logout.onclick = async () => { await supa.auth.signOut(); _authUser = null; location.hash="#/"; };

  // inline edit buttons (shown on public pages when admin is logged in)
  $$("[data-pedit]").forEach(b => b.onclick = (e) => { e.preventDefault(); e.stopPropagation(); location.hash = "#/admin/posting?edit=" + b.dataset.pedit; });
  $$("[data-gedit]").forEach(b => b.onclick = (e) => { e.preventDefault(); e.stopPropagation(); location.hash = "#/admin/galeri"; });
  $$("[data-eedit]").forEach(b => b.onclick = (e) => { e.preventDefault(); e.stopPropagation(); location.hash = "#/admin/jadwal?edit=" + b.dataset.eedit; });

  if (path==="/galeri") bindLightbox();
  if (path==="/jabatan") bindJabatan();
  if (path==="/admin/jabatan-skk") bindCrud("skk", true);
  if (path==="/admin/program") {
    bindCrud("programs", true);
    const cs = $("#cert-save");
    if (cs) cs.onclick = () => {
      const st = getSettings();
      const t = $("#cert-title").value.trim();
      if (!t) { alert("Judul halaman wajib diisi."); return; }
      st.certPageTitle = t;
      st.certPageSubtitle = $("#cert-sub").value.trim();
      saveSettings(st);
      cs.textContent = "Tersimpan \u2713";
      setTimeout(render, 700);
    };
  }
  if (path==="/admin/jadwal") bindCrud("events", true);
  if (path==="/admin/konten") { bindCrud("features"); bindCrud("steps"); bindCrud("testimonials"); }
  if (path==="/admin/posting") bindPostAdmin();
  if (path==="/admin/galeri") bindGalleryAdmin();
  if (path==="/admin/mitra") bindPartnersAdmin();
  if (path==="/admin/pengaturan") bindSettings();
}

function bindLightbox() {
  const lb = $("#lightbox");
  const items = $$("[data-lb]");
  let current = 0;

  const open = (idx) => {
    current = idx;
    const el = items[idx];
    const img = $("#lb-img");
    img.src = "";
    img.src = el.getAttribute("data-lb");
    $("#lb-cap").textContent = el.getAttribute("data-cap") || "";
    lb.classList.remove("hidden");
    document.body.style.overflow = "hidden";
  };

  const close = () => {
    lb.classList.add("hidden");
    document.body.style.overflow = "";
  };

  items.forEach((el, idx) => el.onclick = () => open(idx));
  $("#lb-close").onclick = close;
  lb.onclick = e => { if (e.target === lb || e.target.closest("figure") === null) close(); };
  document.addEventListener("keydown", function lbKey(e) {
    if (lb.classList.contains("hidden")) return;
    if (e.key === "Escape") close();
  });
}

function bindPostAdmin() {
  const modal = $("#post-modal");
  const setPrev = (src) => { $("#p-img-prev").innerHTML = src ? `<img src="${src}" class="w-full h-full object-cover" alt="">` : ""; $("#p-img-prev").className = "w-24 h-16 rounded overflow-hidden flex-shrink-0 " + (src?"":"ph-img"); };
  const open = (post) => {
    $("#modal-title").textContent = post?"Edit Posting":"Posting Baru";
    $("#p-id").value = post?post.id:""; $("#p-title").value = post?post.title:"";
    $("#p-cat").value = post?post.category:""; $("#p-date").value = post?post.date:new Date().toISOString().slice(0,10);
    $("#p-excerpt").value = post?post.excerpt:""; $("#p-body").value = post?post.body:"";
    $("#p-feat").checked = post?!!post.featured:false; $("#p-img").value = post?(post.image||""):"";
    setPrev(post?(post.image||""):""); $("#p-img-file").value="";
    modal.classList.remove("hidden"); window.scrollTo(0,0);
  };
  const close = () => modal.classList.add("hidden");
  $("#new-post").onclick = () => open(null);
  $("#modal-close").onclick = close; $("#modal-cancel").onclick = close;
  $$("[data-edit]").forEach(b => b.onclick = () => open(getPosts().find(x=>String(x.id)===b.dataset.edit)));
  $$("[data-del]").forEach(b => b.onclick = () => { if (!confirm("Hapus posting ini?")) return; savePosts(getPosts().filter(x=>String(x.id)!==b.dataset.del)); render(); });
  $("#p-img-file").onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try { const d = await fileToData(f,1280,0.72); $("#p-img").value = d; setPrev(d); }
    catch { alert("Gagal memproses gambar."); }
  };
  $("#p-img-clear").onclick = () => { $("#p-img").value=""; setPrev(""); $("#p-img-file").value=""; };
  $("#modal-save").onclick = () => {
    const title = $("#p-title").value.trim(); if (!title) { alert("Judul wajib diisi."); return; }
    const posts = getPosts(); const id = $("#p-id").value;
    const data = { title, category: $("#p-cat").value.trim()||"Umum", date: $("#p-date").value||new Date().toISOString().slice(0,10),
      excerpt: $("#p-excerpt").value.trim(), body: $("#p-body").value.trim(), image: $("#p-img").value||"", featured: $("#p-feat").checked };
    if (data.featured) posts.forEach(p=>p.featured=false);
    if (id) { const idx = posts.findIndex(x=>String(x.id)===String(id)); posts[idx] = Object.assign(posts[idx], data); }
    else { data.id = Date.now(); posts.unshift(data); }
    const ok = savePosts(posts);
    if (!ok) alert("Penyimpanan penuh. Gunakan gambar lebih kecil atau kurangi jumlah posting bergambar.");
    close(); render();
  };

  // Deep-link: open editor directly when arriving from a public-page edit button
  const q = getQuery();
  if (q.edit || q.new) {
    if (q.edit) { const p = getPosts().find(x=>String(x.id)===String(q.edit)); if (p) open(p); }
    else open(null);
    history.replaceState(null, "", "#/admin/posting"); // clear query (no reopen on re-render)
  }
}

function bindGalleryAdmin() {
  let pending = "";
  $("#g-file").onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try { pending = await fileToData(f,1280,0.72); $("#g-prev").innerHTML = `<img src="${pending}" class="w-full h-full object-contain" alt="">`; $("#g-prev").className = "aspect-[4/3] rounded bg-white overflow-hidden border border-outline-variant"; }
    catch { alert("Gagal memproses gambar."); }
  };
  $("#g-upload").onclick = () => {
    if (!pending) { alert("Pilih gambar terlebih dahulu."); return; }
    const g = getGallery();
    g.unshift({ id: Date.now(), caption: $("#g-caption").value.trim()||"Dokumentasi Kegiatan", type: $("#g-type").value, image: pending });
    const ok = saveGallery(g);
    if (!ok) alert("Penyimpanan penuh. Gunakan foto lebih kecil atau hapus beberapa foto lama.");
    render();
  };
  $$("[data-gdel]").forEach(b => b.onclick = () => { if (!confirm("Hapus item ini?")) return; saveGallery(getGallery().filter(x=>String(x.id)!==b.dataset.gdel)); render(); });

  const gm = $("#gedit-modal");
  const gclose = () => gm.classList.add("hidden");
  $$("[data-gedit2]").forEach(b => b.onclick = () => {
    const it = getGallery().find(x=>String(x.id)===b.dataset.gedit2); if (!it) return;
    $("#gedit-id").value = it.id; $("#gedit-caption").value = it.caption||""; $("#gedit-type").value = it.type||"Kegiatan";
    gm.classList.remove("hidden");
  });
  $("#gedit-close").onclick = gclose; $("#gedit-cancel").onclick = gclose;
  gm.onclick = e => { if (e.target===gm) gclose(); };
  $("#gedit-save").onclick = () => {
    const g = getGallery(); const idx = g.findIndex(x=>String(x.id)===String($("#gedit-id").value));
    if (idx>=0) { g[idx].caption = $("#gedit-caption").value.trim()||"Dokumentasi Kegiatan"; g[idx].type = $("#gedit-type").value; saveGallery(g); }
    gclose(); render();
  };
}

function bindPartnersAdmin() {
  let pending = "";
  $("#pt-file").onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try { pending = await fileToData(f, 400, 0.9, "image/png"); $("#pt-prev").innerHTML = `<img src="${pending}" class="max-h-full max-w-full object-contain" alt="">`; }
    catch { alert("Gagal memproses logo."); }
  };
  $("#pt-add").onclick = () => {
    const name = $("#pt-name").value.trim();
    if (!name) { alert("Nama mitra wajib diisi."); return; }
    const arr = getPartners();
    arr.push({ id: Date.now(), name, type: $("#pt-type").value, logo: pending });
    const ok = savePartners(arr);
    if (!ok) alert("Penyimpanan penuh. Gunakan logo lebih kecil.");
    render();
  };
  $$("[data-ptdel]").forEach(b => b.onclick = () => { if (!confirm("Hapus mitra ini?")) return; savePartners(getPartners().filter(x=>String(x.id)!==b.dataset.ptdel)); render(); });
}

function bindSettings() {
  $("#save-settings").onclick = async () => {
    const btn = $("#save-settings");
    btn.disabled = true;
    btn.innerHTML = "<span class='material-symbols-outlined animate-spin'>progress_activity</span> Menyimpan...";
    const s = getSettings();
    ["siteName","tagline","heroTitle","heroSubtitle","heroBadge","heroCta1","heroCta2","progEyebrow","progTitle","navAbout","navCert","navInfo","navPartner","navEvents","navAllPrograms","navJabatan","ctaTitle","ctaText","footerText","accreditation","aboutText","visi","misi","waNumber","phone","email","address","statAlumni","statBatch","statLulus","statResmi","heroMediaType"]
      .forEach(k => { const el = $("#s-"+k); if (el) s[k]=el.value; });

    /* If Supabase is ready, await the upsert so we can catch errors */
    if (_dbReady && supa) {
      _cache["settings"] = s;
      const { error } = await supa.from("site_data").upsert({ key: "settings", value: s, updated_at: new Date().toISOString() });
      btn.disabled = false;
      btn.innerHTML = "<span class='material-symbols-outlined'>save</span> Simpan Pengaturan";
      if (error) {
        alert("Gagal menyimpan ke Supabase: " + error.message);
        return;
      }
    } else {
      saveSettings(s);
      btn.disabled = false;
      btn.innerHTML = "<span class='material-symbols-outlined'>save</span> Simpan Pengaturan";
    }
    /* Handle hero media separately (not a simple text input) */
    const hmTypeEl = $("#s-heroMediaType");
    if (hmTypeEl) {
      s.heroMediaType = hmTypeEl.value;
      if (hmTypeEl.value === "video") {
        s.heroMediaUrl = ($("#s-heroVideoUrl") || {}).value || "";
      } else if (hmTypeEl.value === "image") {
        const hf = $("#hero-img-file");
        if (hf && hf.dataset.dataUrl) s.heroMediaUrl = hf.dataset.dataUrl;
        else if (!hf || !hf.dataset.dataUrl) {
          /* keep existing if no new upload */
          const existing = getSettings().heroMediaType === "image" ? getSettings().heroMediaUrl : "";
          if (!s.heroMediaUrl) s.heroMediaUrl = existing;
        }
      } else {
        s.heroMediaUrl = "";
      }
    }

    const msg = $("#settings-msg"); msg.classList.remove("hidden"); setTimeout(()=>msg.classList.add("hidden"),2500);
  };
  const lf = $("#logo-file");
  if (lf) lf.onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const d = await fileToData(f,240,0.92,"image/png");
      const s = getSettings(); s.logo = d;
      const ok = saveSettings(s);
      if (!ok) { alert("Logo terlalu besar untuk disimpan. Coba gambar lebih kecil."); return; }
      render();
    } catch { alert("Gagal memproses logo."); }
  };
  const lc = $("#logo-clear");
  if (lc) lc.onclick = () => { const s = getSettings(); s.logo=""; saveSettings(s); render(); };

  /* Hero media type toggle */
  const hmType = $("#s-heroMediaType");
  if (hmType) {
    const toggleHeroWrap = () => {
      const v = hmType.value;
      const imgWrap = $("#hero-img-wrap"); const vidWrap = $("#hero-video-url-wrap");
      if (imgWrap) imgWrap.classList.toggle("hidden", v !== "image");
      if (vidWrap) vidWrap.classList.toggle("hidden", v !== "video");
    };
    hmType.onchange = toggleHeroWrap;
    /* Image upload for hero */
    const heroFile = $("#hero-img-file");
    if (heroFile) heroFile.onchange = async (e) => {
      const f = e.target.files[0]; if (!f) return;
      try {
        const d = await fileToData(f, 1600, 0.82);
        const prev = $("#hero-img-prev"); if (prev) prev.innerHTML = `<img src="${d}" class="w-full h-auto block" alt="">`;
        /* store temporarily on element for save handler */
        heroFile.dataset.dataUrl = d;
      } catch { alert("Gagal memproses gambar hero."); }
    };
    const heroClear = $("#hero-img-clear");
    if (heroClear) heroClear.onclick = () => {
      if (heroFile) { heroFile.value = ""; heroFile.dataset.dataUrl = ""; }
      const prev = $("#hero-img-prev"); if (prev) prev.innerHTML = "";
    };
  }
  $("#reset-data").onclick = () => {
    if (!confirm("Reset semua data (pengaturan, konten beranda, program, jadwal, posting, galeri, mitra) ke kondisi awal?")) return;
    saveSettings(Object.assign({}, DEFAULT_SETTINGS)); savePosts(DEFAULT_POSTS); saveGallery(DEFAULT_GALLERY);
    savePrograms(DEFAULT_PROGRAMS); saveFeatures(DEFAULT_FEATURES); saveSteps(DEFAULT_STEPS); saveTestimonials(DEFAULT_TESTIMONIALS);
    savePartners(DEFAULT_PARTNERS); saveEvents(DEFAULT_EVENTS); saveSkk(DEFAULT_SKK);
    render();
  };
}
